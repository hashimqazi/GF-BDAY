<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Birthday Wordle</title>
</head>
<body>
    <div id="wordle-page" class="container">
        <h1>🎮 Play Wordle to Unlock</h1>
        <div id="wordle-game">
            <div id="board"></div>
            <div id="keyboard"></div>
            <div id="message"></div>
        </div>
    </div>
    <div id="birthday-page" class="hidden">
        <h1>Happy Birthday! 🎉</h1>
        <div class="wishes">
            <p>You made it! Happy Birthday to my PHATASS! 😘</p>
            <p>I love you more than anything in this world.</p>
        </div>
        <div class="gallery">
            <h2>Our Memories 💕</h2>
            <img src="photo1.jpg" alt="Birthday Photo 1">
            <img src="photo2.jpg" alt="Birthday Photo 2">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
